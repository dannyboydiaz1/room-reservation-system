<!DOCTYPE html>
<html>
<head>
    <title>Reservation Room</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Room Reservation</a>

    <div>
      {% if user.is_authenticated %}
        <span class="text-white me-3">Hi, {{ user.username }}</span>
        <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a>
      {% else %}
        <a href="/login/" class="btn btn-outline-light btn-sm">Login</a>
        <a href="/register/" class="btn btn-warning btn-sm">Register</a>
         <!-- <a href="/my-bookings/" class="btn btn-outline-light btn-sm me-2">My Bookings</a>
        <span class="text-white me-3">Hi, {{ user.username }}</span>
        <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a> -->
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
