<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Reservation</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Room Reservation</a>

    <div>
      {% if user.is_authenticated %}
        <a href="/my-bookings/" class="btn btn-outline-light btn-sm me-2">
            My Bookings
        </a>

        <span class="text-white me-3">
            Hi, {{ user.username }}
        </span>

        <a href="/logout/" class="btn btn-outline-light btn-sm">
            Logout
        </a>
      {% else %}
        <a href="/login/" class="btn btn-outline-light btn-sm me-2">
            Login
        </a>

        <a href="/register/" class="btn btn-warning btn-sm">
            Register
        </a>
      {% endif %}
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-4">

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    <!-- Page Content -->
    {% block content %}
    {% endblock %}

</div>

<!-- Bootstrap JS (for alerts, buttons, etc.) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
